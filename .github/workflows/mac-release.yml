name: Mac Build and Release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-14
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Raylib
        run: brew install raylib

      - name: Build native Mac binary (Statically Linked)
        run: |
          # Link against the static archive (.a) instead of the dynamic library (.dylib)
          # We also have to manually pull in the Apple frameworks Raylib needs
          clang main.c -o hello_raylib_mac \
            -I/opt/homebrew/include \
            /opt/homebrew/lib/libraylib.a \
            -framework CoreVideo \
            -framework IOKit \
            -framework Cocoa \
            -framework GLUT \
            -framework OpenGL

      - name: Package binary
        run: zip hello_raylib_mac.zip hello_raylib_mac

      - name: Create Release and Upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG_NAME="build-$(git rev-parse --short HEAD)"
          gh release create "$TAG_NAME" hello_raylib_mac.zip \
            --title "Mac Build ($TAG_NAME)" \
            --notes "Automated build for macOS (Apple Silicon). Statically linked."
